<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B6FFF"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="9" y="10" width="14" height="13" rx="2" fill="#050816" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.7"/>
  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="6" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.9"/>
  <circle cx="16" cy="5.5" r="1.5" fill="#00E5FF"/>
  <!-- Visor -->
  <rect x="11" y="13" width="10" height="4" rx="1" fill="#001833" stroke="#00E5FF" stroke-width="0.6" stroke-opacity="0.8"/>
  <!-- Visor glow line -->
  <rect x="11.5" y="14.8" width="9" height="0.8" rx="0.4" fill="#00E5FF" fill-opacity="0.6"/>
  <!-- Mouth curve -->
  <path d="M12 21 Q16 23.5 20 21" stroke="#00E5FF" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.85"/>
</svg>
